services:
  maintenance:
    image: ghcr.io/blixten85/docker-idempotent-update:latest
    container_name: docker-maintenance
    pull_policy: always
    restart: "no"
    environment:
      COMPOSE_DIR: /config
      COMPOSE_FILE: /config/docker-compose.yml
      RCLONE_SRC: /docker
      RCLONE_DST: ${RCLONE_DST:-gdrive:backups}
      EMAIL_TO: ${EMAIL_TO:-}
    volumes:
      - ${COMPOSE_DIR:-~/.config/docker}:/config:ro
      - ${DOCKER_DIR:-~/.docker}:/docker:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ${HOME}/.msmtprc:/root/.msmtprc:ro
      - ${HOME}/.config/rclone:/root/.config/rclone:ro
