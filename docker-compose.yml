services:
  docker-maintenance:
    image: ghcr.io/blixten85/docker-idempotent-update:latest
    container_name: docker-maintenance
    restart: unless-stopped
    environment:
      EMAIL_TO: ${EMAIL_TO}
      CRON_SCHEDULE: 0 3 * * *  # minute hour day-of-month month day-of-week
      RCLONE_CONFIG: /config/rclone.conf
      # DRY_RUN: "true"  # set to "true" to test without making any changes
      # Option A: manage containers via compose file (uncomment + uncomment volume below)
      COMPOSE_FILE: /compose/docker-compose.yml
    security_opt:
      - no-new-privileges:true
    volumes:
      - ${DOCKER}/docker-maintenance/config:/config
      # Option B: use docker socket (comment out COMPOSE_FILE and ${CONFIG} volume above/below)
      # - /var/run/docker.sock:/var/run/docker.sock
      # Option A: mount compose directory (comment out to use Option B)
      - ${CONFIG}:/compose:ro
    networks:
      - lsio

networks:
  lsio:
    external: true
    # If this network does not exist, create it with: docker network create lsio
