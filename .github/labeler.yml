src:
  - changed-files:
    - any-glob-to-any-file: 'src/**'

tests:
  - changed-files:
    - any-glob-to-any-file: 'tests/**'

ci:
  - changed-files:
    - any-glob-to-any-file: '.github/**'

documentation:
  - changed-files:
    - any-glob-to-any-file:
      - '**.md'

dependencies:
  - changed-files:
    - any-glob-to-any-file: '**/requirements*.txt'
