name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  actions: write   # needed to dispatch Build via gh workflow run

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7  # v5.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # release-please creates the GitHub Release via GITHUB_TOKEN, and events
      # produced by GITHUB_TOKEN do not trigger other workflows. Dispatch Build
      # explicitly so the new tag gets a semver-tagged docker image.
      - name: Dispatch Build for new release tag
        if: ${{ steps.release.outputs.release_created == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag_name }}
        run: gh workflow run build.yml --ref "$TAG"
