name: Build

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'src/**'
      - '*.template'
  pull_request:
    paths:
      - 'Dockerfile'
      - 'src/**'
      - '*.template'
      - '.github/workflows/build.yml'
  release:
    types: [published]
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ github.repository_owner }}/docker-idempotent-update

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v6
      - name: ruff check
        run: uvx ruff check src/
      - name: ruff format
        run: uvx ruff format --check src/

  smoke:
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
    strategy:
      matrix:
        mode: [update, backup, both]
    env:
      MODE: ${{ matrix.mode }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Build image
        run: docker build -t didu:test .
      - name: Reject invalid MODE
        run: |
          set +e
          out=$(docker run --rm -e MODE=invalid didu:test 2>&1)
          rc=$?
          set -e
          echo "$out"
          if [ $rc -eq 0 ]; then
            echo "invalid MODE was not rejected (exit 0)"
            exit 1
          fi
          echo "$out" | grep -q "Invalid MODE" || {
            echo "expected Invalid MODE message not found"
            exit 1
          }
      - name: Validate startup for MODE
        run: |
          mkdir -p /tmp/cfg /tmp/data
          MOUNTS=(-v /tmp/cfg:/config)
          if [ "$MODE" = "update" ] || [ "$MODE" = "both" ]; then
            MOUNTS+=(-v /var/run/docker.sock:/var/run/docker.sock)
          fi
          if [ "$MODE" = "backup" ] || [ "$MODE" = "both" ]; then
            touch /tmp/cfg/rclone.conf
            MOUNTS+=(-v /tmp/data:/data:ro)
          fi
          # Detached + logs pattern — entrypoint execs into crond which never
          # exits, so foreground `timeout 5 docker run` would hang past the 6h
          # GHA cap if SIGTERM is not propagated cleanly.
          cid=$(docker run -d \
            -e MODE="$MODE" \
            -e EMAIL_TO=test@example.com \
            "${MOUNTS[@]}" \
            didu:test)
          sleep 3
          out=$(docker logs "$cid" 2>&1)
          docker rm -f "$cid" >/dev/null
          echo "$out"
          echo "$out" | grep -q "Mode: $MODE" || { echo "startup line missing"; exit 1; }
          echo "$out" | grep -q "Scheduled:" || { echo "never reached crond setup"; exit 1; }
      - name: Run with DRY_RUN for MODE
        run: |
          MOUNTS=(-v /tmp/cfg:/config)
          if [ "$MODE" = "update" ] || [ "$MODE" = "both" ]; then
            MOUNTS+=(-v /var/run/docker.sock:/var/run/docker.sock)
          fi
          if [ "$MODE" = "backup" ] || [ "$MODE" = "both" ]; then
            MOUNTS+=(-v /tmp/data:/data:ro)
          fi
          out=$(timeout --kill-after=10 60 docker run --rm \
            --entrypoint python3 \
            -e MODE="$MODE" \
            -e DRY_RUN=true \
            "${MOUNTS[@]}" \
            didu:test -m src.run 2>&1 || true)
          echo "$out"
          echo "$out" | grep -q "=== mode: $MODE ===" || { echo "run did not log mode header"; exit 1; }
          echo "$out" | grep -q "=== send report ===" || { echo "send_report was not invoked"; exit 1; }
          echo "$out" | grep -q "Status written" || { echo "status.json was not written"; exit 1; }
          [ -s /tmp/cfg/status.json ] || { echo "status.json missing or empty"; exit 1; }
          python3 -c "import json; s=json.load(open('/tmp/cfg/status.json')); assert s['mode']=='$MODE', f'mode mismatch: {s[\"mode\"]}'" || { echo "status.json mode field mismatch"; cat /tmp/cfg/status.json; exit 1; }

  build:
    runs-on: ubuntu-latest
    needs: smoke
    permissions:
      contents: read
      packages: write
      id-token: write
      security-events: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Lowercase IMAGE_NAME
        run: echo "IMAGE_NAME=${IMAGE_NAME,,}" >> $GITHUB_ENV

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9  # v6
        with:
          images: |
            ghcr.io/${{ env.IMAGE_NAME }}
            mormor85/docker-idempotent-update
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a  # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4
        with:
          username: mormor85
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
          provenance: mode=max
          sbom: true

      - name: Trivy vulnerability scan
        if: github.event_name != 'pull_request'
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          image-ref: ghcr.io/${{ env.IMAGE_NAME }}:latest
          format: sarif
          output: trivy-results.sarif
          severity: MEDIUM,HIGH,CRITICAL
          ignore-unfixed: true

      - name: Upload Trivy results to GitHub Security
        if: github.event_name != 'pull_request'
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa  # v4.36.0
        with:
          sarif_file: trivy-results.sarif
          category: trivy-${{ env.IMAGE_NAME }}
