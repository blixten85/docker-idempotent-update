name: Build

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - '*.sh'
      - '*.template'
  release:
    types: [published]
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ github.repository_owner }}/docker-idempotent-update

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: shellcheck
        run: shellcheck entrypoint.sh run.sh rclone_backup.sh send_report.sh

  smoke:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        mode: [update, backup, both]
    env:
      MODE: ${{ matrix.mode }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Build image
        run: docker build -t didu:test .
      - name: Reject invalid MODE
        run: |
          set +e
          out=$(docker run --rm -e MODE=invalid didu:test 2>&1)
          rc=$?
          set -e
          echo "$out"
          if [ $rc -eq 0 ]; then
            echo "invalid MODE was not rejected (exit 0)"
            exit 1
          fi
          echo "$out" | grep -q "ERROR: invalid MODE" || {
            echo "expected ERROR message not found"
            exit 1
          }
      - name: Validate startup for MODE
        run: |
          mkdir -p /tmp/cfg
          touch /tmp/cfg/rclone.conf
          out=$(timeout 5 docker run --rm \
            -e MODE="$MODE" \
            -e EMAIL_TO=test@example.com \
            -v /tmp/cfg:/config \
            -v /var/run/docker.sock:/var/run/docker.sock \
            didu:test 2>&1 || true)
          echo "$out"
          echo "$out" | grep -q "Mode: $MODE" || { echo "startup line missing"; exit 1; }
          echo "$out" | grep -q "Scheduled:" || { echo "never reached crond setup"; exit 1; }

  build:
    runs-on: ubuntu-latest
    needs: smoke
    permissions:
      contents: read
      packages: write
      id-token: write
      security-events: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf  # v6
        with:
          images: ghcr.io/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      - name: Trivy vulnerability scan
        if: github.event_name != 'pull_request'
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          image-ref: ghcr.io/${{ env.IMAGE_NAME }}:latest
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Upload Trivy results to GitHub Security
        if: github.event_name != 'pull_request'
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225  # v4.35.2
        with:
          sarif_file: trivy-results.sarif
          category: trivy-${{ env.IMAGE_NAME }}
